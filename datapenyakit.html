<!DOCTYPE html>
<html>
<head>
<title>Data Penyakit</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.content {
  padding:10px;
}

.badge {
  background:red;
  padding:3px 8px;
  border-radius:5px;
  font-size:12px;
}
</style>

</head>

<body>

<h1 style="text-align:center;">🦠 Log Penyakit Tanaman</h1>

<div class="grid" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const app = initializeApp({
  apiKey:"API_KEY_KAMU",
  databaseURL:"URL_DATABASE_KAMU"
});

const db = getDatabase(app);

onValue(ref(db,"penyakit_logs"), snap => {
  const data = snap.val();
  const container = document.getElementById("list");
  container.innerHTML = "";

  Object.values(data || {}).reverse().forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.image_url}">
        <div class="content">
          <h3>${item.penyakit}</h3>
          <span class="badge">${(item.confidence*100).toFixed(1)}%</span>
          <p>${item.tanaman_id}</p>
          <small>${new Date(item.timestamp*1000).toLocaleString()}</small>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
